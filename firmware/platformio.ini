[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101

; PSRAM — required for camera framebuffers
build_flags =
    -DBOARD_HAS_PSRAM

; Default partition table from board definition

; esp32-camera via ESP-IDF component manager (idf_component.yml in src/)
