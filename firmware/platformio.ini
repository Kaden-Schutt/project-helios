[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbmodem101
monitor_port = /dev/cu.usbmodem101

; PSRAM — required for camera framebuffers
build_flags =
    -DBOARD_HAS_PSRAM
    -Wno-error=maybe-uninitialized

; BLE + PSRAM + USB console via sdkconfig
board_build.esp-idf.sdkconfig_defaults =
    sdkconfig.defaults

; Default partition table from board definition

; esp32-camera via ESP-IDF component manager (idf_component.yml in src/)

[env:test_speaker]
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbmodem101
monitor_port = /dev/cu.usbmodem101
build_src_dir = test_speaker

[env:cam_test]
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf
monitor_speed = 115200
build_flags = -DBOARD_HAS_PSRAM -Wno-error=maybe-uninitialized
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults
build_src_filter = +<../test_apps/cam_test.c> +<camera.c> +<ble.c> +<sdcard.c> +<config.c> +<mic.c> +<speaker.c>

