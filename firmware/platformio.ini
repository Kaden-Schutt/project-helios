; Standalone WiFi throughput test. The real pendant fw lives at
; firmware/diag/camera_ota/; the BLE rescue fw at firmware/diag/ble_recovery/.

[env:wifi_test]
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf
monitor_speed = 115200
upload_port = /dev/cu.usbmodem101
monitor_port = /dev/cu.usbmodem101
build_flags = -DBOARD_HAS_PSRAM -Wno-error=maybe-uninitialized
board_build.esp-idf.sdkconfig_defaults = sdkconfig.wifi_test
build_src_filter = -<*> +<../test_apps/wifi_throughput.c> +<wifi.c>
